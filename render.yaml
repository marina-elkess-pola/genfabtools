services:
  - type: web
    name: occucalc-backend
    env: node
    repo: https://github.com/marina-elkess-pola/occupancy-calculator
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm run start
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: static
    name: genfab-frontend
    repo: https://github.com/marina-elkess-pola/occupancy-calculator
    branch: main
    buildCommand: cd occupancy-calculator && npm install && npm run build
    publishPath: occupancy-calculator/build
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://api.genfabtools.com"
